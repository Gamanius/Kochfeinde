services:
  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - frontend
      - server

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file:
      - .env
    ports:
      - "3001"

  frontend:
    build:
      context: .
      dockerfile: apps/kochfeinde/Dockerfile
    env_file:
      - .env
    ports:
      - "3000"
    depends_on:
      - server
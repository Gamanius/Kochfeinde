Unauthorized:
  description: "Unauthorized - invalid or missing credentials"
  content:
    application/json:
      schema:
        type: object
        properties:
          error:
            type: string
            example: "Unauthorized"
NotFound:
  description: "Couldn't find what you were looking for"
  content:
    application/json:
      schema:
        type: object
        properties:
          error:
            type: string
            example: "Not found"
RecipeResponseModel:
  type: object
  required:
    - id
    - slug
    - title
    - description
    - time_active
    - time_taken
    - portion_num
    - portion_string
  properties:
    id:
      type: string
      format: uuid
    slug:
      type: string
    title:
      type: string
    description:
      type: string
    time_taken:
      type: integer
      format: int32
    time_active:
      type: integer
      format: int32
    portion_num:
      type: integer
      format: int32
    portion_string:
      type: string

RecipePatchModel:
  type: object
  properties:
  slug:
    type: string
  title:
    type: string
  description:
    type: string
  time_taken:
    type: integer
    format: int32
  time_active:
    type: integer
    format: int32
  portion_num:
    type: integer
    format: int32
  portion_string:
    type: string
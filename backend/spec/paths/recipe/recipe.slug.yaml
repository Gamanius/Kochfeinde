get:
  tags:
    - Recipes
  parameters:
    - name: slug
      in: path
      required: true
      schema:
        type: string
  responses:
    "200":
      description: A full recipe with steps and ingredients
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/recipe.yaml#/RecipeFullResponseModel'
    "404":
      $ref: '../../components/responses/4xx.yaml#/NotFound'